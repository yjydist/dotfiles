<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <!-- 定义字体别名 -->
    <alias>
        <family>JetBrainsMonoNL Nerd Font</family>
        <prefer>
            <family>Maple Mono NF CN</family>
        </prefer>
    </alias>

    <!-- 定义回滚字体顺序 -->
    <match>
        <test name="family" compare="eq">
            <string>JetBrainsMonoNL Nerd Font</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Maple Mono NF CN</string>
        </edit>
    </match>
</fontconfig>