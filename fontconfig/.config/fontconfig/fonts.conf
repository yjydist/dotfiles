<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <!-- 添加字体目录（如果字体安装在自定义目录） -->
    <dir>/usr/share/fonts</dir>
    <dir>~/.local/share/fonts</dir>

    <!-- 设置主要字体为 JetBrainsMonoNL Nerd Font -->
    <match>
        <test name="family" compare="eq">
            <string>sans-serif</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>JetBrainsMonoNL Nerd Font</string>
        </edit>
    </match>

    <match>
        <test name="family" compare="eq">
            <string>serif</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>JetBrainsMonoNL Nerd Font</string>
        </edit>
    </match>

    <match>
        <test name="family" compare="eq">
            <string>monospace</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>JetBrainsMonoNL Nerd Font</string>
        </edit>
    </match>

    <!-- 设置回滚字体为 Maple Mono SC NF -->
    <match>
        <test name="family" compare="eq">
            <string>JetBrainsMonoNL Nerd Font</string>
        </test>
        <test name="lang" compare="contains">
            <string>zh</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Maple Mono SC NF</string>
        </edit>
    </match>

    <!-- 其他字体使用系统默认设置 -->
    <match>
        <test name="family" compare="eq">
            <string>sans-serif</string>
        </test>
        <edit name="family" mode="assign" binding="weak">
            <string>sans-serif</string>
        </edit>
    </match>

    <match>
        <test name="family" compare="eq">
            <string>serif</string>
        </test>
        <edit name="family" mode="assign" binding="weak">
            <string>serif</string>
        </edit>
    </match>

    <match>
        <test name="family" compare="eq">
            <string>monospace</string>
        </test>
        <edit name="family" mode="assign" binding="weak">
            <string>monospace</string>
        </edit>
    </match>
</fontconfig>